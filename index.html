<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InkStudio Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root{--bg:#090708;--surface:#121013;--surface2:#181519;--border:rgba(255,255,255,.08);--text:#f5f2f3;--muted:#a7a0a4;--accent:#d62828;--accent2:#7f1d1d;--gold:#f0b35a;--good:#22c55e;--warn:#f59e0b;--shadow:0 24px 80px rgba(214,40,40,.18)}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at top,#2b1015 0%,#100d10 28%,#090708 68%,#060506 100%);color:var(--text)}
    .display{font-family:Impact,Haettenschweiler,'Arial Narrow Bold',sans-serif;letter-spacing:.06em;text-transform:uppercase}.shell{display:grid;grid-template-columns:292px 1fr;min-height:100vh}.sidebar{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,0));border-right:1px solid var(--border);padding:24px;position:sticky;top:0;height:100vh}.logo-wrap{display:flex;gap:14px;align-items:center;margin-bottom:28px}.logo-mark{width:58px;height:58px;border-radius:16px;background:linear-gradient(135deg,#ff4d4d 0%,#d62828 45%,#541111 100%);display:grid;place-items:center;box-shadow:var(--shadow);animation:pulse 3.5s ease-in-out infinite}.nav button{width:100%;display:flex;gap:12px;align-items:center;padding:14px 16px;border:1px solid transparent;background:transparent;color:var(--muted);border-radius:16px;margin-bottom:8px;transition:.2s;text-align:left}.nav button:hover,.nav button.active{background:linear-gradient(90deg,rgba(214,40,40,.18),rgba(214,40,40,.04));border-color:rgba(214,40,40,.22);color:#fff;transform:translateX(3px)}
    .content{padding:28px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:16px;margin-bottom:22px}.hero{position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(214,40,40,.12),rgba(255,255,255,.03));border:1px solid var(--border);border-radius:28px;padding:34px;box-shadow:var(--shadow)}.hero:before{content:'';position:absolute;inset:auto -60px -60px auto;width:220px;height:220px;background:radial-gradient(circle,rgba(214,40,40,.30),transparent 68%);filter:blur(6px)}
    .badge{display:inline-flex;gap:8px;align-items:center;padding:8px 12px;border-radius:999px;border:1px solid rgba(240,179,90,.24);background:rgba(240,179,90,.08);color:var(--gold);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:22px 0}.card{background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.015));border:1px solid var(--border);border-radius:24px;padding:20px;transition:.2s}.card:hover{transform:translateY(-2px);border-color:rgba(214,40,40,.18)}.grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.table{width:100%;border-collapse:collapse}.table td,.table th{padding:12px 8px;border-bottom:1px solid rgba(255,255,255,.07);text-align:left;vertical-align:top}.table th{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em}.list{display:grid;gap:12px}.appt{display:flex;justify-content:space-between;gap:12px;padding:14px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05)}.btn{border:none;border-radius:16px;padding:14px 18px;font-weight:700;cursor:pointer;transition:.2s}.btn:hover{transform:translateY(-1px)}.btn-primary{background:linear-gradient(135deg,#ff4d4d,#d62828);color:#fff;box-shadow:0 14px 34px rgba(214,40,40,.25)}.btn-ghost{background:rgba(255,255,255,.03);border:1px solid var(--border);color:#fff}.btn-small{padding:8px 10px;border-radius:12px;font-size:12px}.muted{color:var(--muted)} .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.05)}.section{display:none}.section.active{display:block}.tiny{font-size:12px}.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form-input{width:100%;background:#0f0d0e;border:1px solid rgba(255,255,255,.09);color:#fff;padding:12px 14px;border-radius:14px;outline:none}.form-input:focus{border-color:#d62828;box-shadow:0 0 0 3px rgba(214,40,40,.16)}.inkline{height:8px;border-radius:999px;background:linear-gradient(90deg,#ff4d4d,#d62828,#641313);position:relative;overflow:hidden}.inkline:after{content:'';position:absolute;inset:0;transform:translateX(-100%);background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);animation:sheen 3.2s linear infinite}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}.modal.active{display:flex}.modal-box{width:min(900px,100%);max-height:90vh;overflow:auto;background:linear-gradient(180deg,#151214,#0f0d0e);border:1px solid var(--border);border-radius:24px;box-shadow:var(--shadow);padding:22px}.style-preview{height:170px;border-radius:18px;border:1px solid rgba(255,255,255,.08);background:radial-gradient(circle at 30% 20%,rgba(214,40,40,.22),transparent 38%),linear-gradient(135deg,#191316,#0c090a);display:grid;place-items:center;overflow:hidden}.style-preview svg{width:100%;height:100%;opacity:.92}.empty-state{border:1px dashed rgba(255,255,255,.18);border-radius:18px;padding:22px;background:rgba(255,255,255,.025);color:var(--muted)}.progress{height:10px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}.progress > div{height:100%;background:linear-gradient(90deg,#d62828,#ff4d4d)}.notice{border:1px solid rgba(240,179,90,.22);background:rgba(240,179,90,.07);border-radius:18px;padding:14px;color:#f9d7a1}.ok{border:1px solid rgba(34,197,94,.2);background:rgba(34,197,94,.08);border-radius:18px;padding:14px;color:#bbf7d0}.watermark{position:fixed;right:18px;bottom:14px;color:rgba(255,255,255,.18);font-size:11px;z-index:1;pointer-events:none}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    @keyframes pulse{0%,100%{transform:scale(1);box-shadow:0 0 0 rgba(214,40,40,0)}50%{transform:scale(1.04);box-shadow:0 0 28px rgba(214,40,40,.28)}} @keyframes sheen{100%{transform:translateX(120%)}}
    @media (max-width:1100px){.shell{grid-template-columns:1fr}.sidebar{position:relative;height:auto}.kpis,.grid-2,.grid-3,.form-row{grid-template-columns:1fr}.topbar{flex-direction:column;align-items:flex-start}}
    /* ===== Responsive real: PC + tablet + celular ===== */
    .mobile-only{display:none}.table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:18px}.table{min-width:680px}.card{min-width:0}.content,.hero,.card,.modal-box{max-width:100%}.top-actions{display:flex;gap:10px;flex-wrap:wrap}.main-title{font-size:54px;margin:10px 0 8px}.section-title{font-size:34px;margin:0 0 14px}.desktop-label{display:inline}
    @media (max-width:768px){
      body{background:radial-gradient(circle at top,#2b1015 0%,#100d10 30%,#090708 100%);padding-bottom:86px;overflow-x:hidden}
      .watermark{display:none}.shell{display:block;min-height:100vh}.content{padding:94px 12px 18px}.sidebar{position:fixed;top:0;left:0;right:0;height:74px;z-index:30;padding:10px 12px;background:rgba(9,7,8,.92);backdrop-filter:blur(16px);border-right:0;border-bottom:1px solid var(--border)}
      .logo-wrap{margin:0}.logo-mark{width:46px;height:46px;border-radius:14px}.logo-wrap .display{font-size:23px!important}.logo-wrap .tiny{font-size:11px;max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .nav{position:fixed;left:10px;right:10px;bottom:10px;z-index:40;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:8px;background:rgba(15,13,14,.94);border:1px solid var(--border);border-radius:24px;box-shadow:0 18px 60px rgba(0,0,0,.42);backdrop-filter:blur(18px)}
      .nav button{margin:0;min-width:0;height:54px;padding:7px 4px;border-radius:16px;justify-content:center;text-align:center;font-size:0;flex-direction:column;gap:3px;color:#d8d2d5}.nav button::first-letter{font-size:20px}.nav button.active,.nav button:hover{transform:none;background:rgba(214,40,40,.22);border-color:rgba(214,40,40,.28)}
      .nav button:nth-child(n+6){display:none}.nav button[data-view="dashboard"]::after{content:'Inicio';font-size:10px}.nav button[data-view="agenda"]::after{content:'Agenda';font-size:10px}.nav button[data-view="clientes"]::after{content:'Clientes';font-size:10px}.nav button[data-view="disenos"]::after{content:'Diseños';font-size:10px}.nav button[data-view="ventas"]::after{content:'Ventas';font-size:10px}
      .topbar{margin-bottom:14px;gap:12px}.main-title,#mainTitle{font-size:31px!important;line-height:.95!important;word-break:break-word}.badge{font-size:10px;padding:7px 10px;letter-spacing:.08em}#subtitle{font-size:14px}.top-actions,.topbar>div:last-child{width:100%;display:grid!important;grid-template-columns:1fr 1fr;gap:8px}.btn{padding:12px 13px;border-radius:14px}.hero{padding:18px;border-radius:22px}.hero h2{font-size:30px!important}.kpis{grid-template-columns:1fr 1fr!important;gap:10px;margin:16px 0}.kpis .card{padding:14px;border-radius:18px}.kpis .display{font-size:25px!important}.grid-2,.grid-3{grid-template-columns:1fr!important;gap:12px}.card{padding:16px;border-radius:20px;overflow:hidden}.card:hover{transform:none}.section-title{font-size:28px}.appt{align-items:flex-start;flex-direction:column}.appt>div:last-child{text-align:left!important;width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px}.style-preview{height:145px}.modal{padding:10px;align-items:flex-end}.modal-box{width:100%;max-height:88vh;border-radius:22px 22px 0 0;padding:18px}.modal-box>div:first-child{align-items:flex-start}.modal-box #modalTitle{font-size:24px!important}.form-row{grid-template-columns:1fr!important}.form-input{font-size:16px}.toolbar{display:grid;grid-template-columns:1fr;gap:8px}.notice{font-size:12px;word-break:break-all}.table-wrap{margin:8px -2px 0}.table{min-width:620px;font-size:13px}.table td,.table th{padding:10px 8px}.empty-state{padding:16px;border-radius:16px}.mobile-only{display:block}.desktop-label{display:none}
    }
    @media (max-width:380px){.content{padding-left:10px;padding-right:10px}.kpis{grid-template-columns:1fr!important}.top-actions,.topbar>div:last-child{grid-template-columns:1fr}.nav{grid-template-columns:repeat(5,1fr);left:6px;right:6px}.nav button{height:50px}.main-title,#mainTitle{font-size:28px!important}}
  </style>
</head>
<body>
<div class="watermark" id="watermark"></div>
<div class="shell">
  <aside class="sidebar">
    <div class="logo-wrap"><div class="logo-mark" aria-hidden="true"><svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M17 47L30 17L35 28L47 14" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M44 14H50V20" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><path d="M18 49H46" stroke="white" stroke-width="5" stroke-linecap="round"/></svg></div><div><div class="display" style="font-size:30px;line-height:1">InkStudio Pro</div><div class="muted tiny" id="sidebarStudio">Sistema comercial para estudios tattoo</div></div></div>
    <nav class="nav"><button class="active" data-view="dashboard">⚡ Dashboard</button><button data-view="agenda">🗓️ Agenda</button><button data-view="clientes">👤 Clientes</button><button data-view="disenos">🎨 Diseños</button><button data-view="ventas">💸 Ventas</button><button data-view="artistas">🧑‍🎨 Artistas</button><button data-view="marketing">📣 Marketing</button><button data-view="config">⚙️ Configuración</button></nav>
  </aside>
  <main class="content">
    <div class="topbar"><div><span class="badge" id="licenseBadge">licencia activa</span><h1 class="display main-title" id="mainTitle">InkStudio Pro</h1><p class="muted" style="max-width:78ch" id="subtitle">Agenda, clientes, diseños, ventas, artistas y marketing para estudios de tatuaje.</p></div><div class="top-actions"><button class="btn btn-primary" onclick="openModal('nueva-cita')">Nueva cita</button><button class="btn btn-ghost" onclick="openModal('nuevo-cliente')">Nuevo cliente</button></div></div>
    <section class="hero section active" id="view-dashboard"></section><section class="section" id="view-agenda"></section><section class="section" id="view-clientes"></section><section class="section" id="view-disenos"></section><section class="section" id="view-ventas"></section><section class="section" id="view-artistas"></section><section class="section" id="view-marketing"></section><section class="section" id="view-config"></section>
  </main>
</div>
<div class="modal" id="modal"><div class="modal-box"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><h2 class="display" id="modalTitle" style="font-size:30px;margin:0"></h2><button class="btn btn-ghost" onclick="closeModal()">Cerrar</button></div><div id="modalBody" style="margin-top:16px"></div></div></div>
<script>
const params=new URLSearchParams(location.search);
const studio=(params.get('studio')||params.get('estudio')||'Mi Estudio').replace(/[-_]/g,' ').trim();
const lic=(params.get('lic')||params.get('licencia')||'INK-000').trim();
const safe=s=>String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));
const money=n=>Number(n||0).toLocaleString('es-MX',{style:'currency',currency:'MXN'});
const todayISO=()=>new Date().toISOString().slice(0,10);
const storageKey=`inkstudio_pro_${studio}_${lic}`.replace(/\s+/g,'_').toLowerCase();
const initialState={citas:[],clientes:[],ventas:[],artistas:[],mensajes:[]};
let state=loadState();
const estilos=[
  {name:'Tradicional',desc:'Tigre tradicional, líneas gruesas y alto contraste.',icon:'tiger'},
  {name:'Blackwork',desc:'Composición negra ornamental.',icon:'blackwork'},
  {name:'Fine line',desc:'Trazo fino botánico.',icon:'fineline'},
  {name:'Lettering',desc:'Tipografía script para frases y nombres.',icon:'lettering'},
  {name:'Minimalista',desc:'Símbolo pequeño, limpio y discreto.',icon:'minimal'},
  {name:'Realismo',desc:'Retrato y sombra en escala de grises.',icon:'realismo'}
];
function loadState(){try{const raw=localStorage.getItem(storageKey);return raw?{...initialState,...JSON.parse(raw)}:{...initialState};}catch(e){return {...initialState};}}
function saveState(){localStorage.setItem(storageKey,JSON.stringify(state));render();}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function setIdentity(){document.title=`InkStudio Pro | ${studio}`;document.getElementById('mainTitle').textContent=`InkStudio Pro · ${studio}`;document.getElementById('sidebarStudio').textContent=`Licencia de ${studio}`;document.getElementById('subtitle').textContent=`Sistema personalizado para ${studio}: agenda, clientes, diseños, ventas, artistas y marketing en una sola pantalla.`;document.getElementById('licenseBadge').textContent=`licencia activa · ${lic}`;document.getElementById('watermark').textContent=`${studio} · ${lic}`;}
function emptyState(title,copy,action,type){return `<div class="empty-state"><b>${title}</b><p style="margin:8px 0 14px">${copy}</p>${action?`<button class="btn btn-primary" onclick="openModal('${type}')">${action}</button>`:''}</div>`}
function dashboard(){const citasHoy=state.citas.filter(c=>(c.fecha||'').slice(0,10)===todayISO()).length;const ingresosHoy=state.ventas.filter(v=>(v.fecha||'').slice(0,10)===todayISO()).reduce((a,v)=>a+Number(v.monto||0),0);const anticipos=state.ventas.filter(v=>v.tipo==='Anticipo').reduce((a,v)=>a+Number(v.monto||0),0);return `<div style="position:relative;z-index:2"><span class="badge">panel principal</span><h2 class="display" style="font-size:44px;margin:12px 0">${safe(studio)}</h2><p class="muted">Sistema listo para comenzar. Los datos se guardan en este navegador mediante almacenamiento local.</p></div><div class="kpis"><div class="card"><div class="muted tiny">Citas de hoy</div><div class="display" style="font-size:36px">${citasHoy}</div></div><div class="card"><div class="muted tiny">Ingresos del día</div><div class="display" style="font-size:36px">${money(ingresosHoy)}</div></div><div class="card"><div class="muted tiny">Anticipos registrados</div><div class="display" style="font-size:36px">${money(anticipos)}</div></div><div class="card"><div class="muted tiny">Clientes registrados</div><div class="display" style="font-size:36px">${state.clientes.length}</div></div></div><div class="grid-2"><div class="card"><h3 class="display">Agenda rápida</h3>${apptList(5)}</div><div class="card"><h3 class="display">Flujo de ventas</h3>${ventasList(5)}</div></div>`}
function apptList(limit){if(!state.citas.length)return emptyState('Sin citas todavía','Cuando registres una cita, aparecerá aquí para dar seguimiento rápido.','Nueva cita','nueva-cita');return `<div class="list">${state.citas.slice().sort((a,b)=>(a.fecha||'').localeCompare(b.fecha||'')).slice(0,limit||999).map(c=>`<div class="appt"><div><b>${safe(c.cliente)}</b><div class="muted tiny">${safe(formatDate(c.fecha))} · ${safe(c.servicio)}</div><div class="muted tiny">${safe(c.artista||'Sin artista asignado')}</div></div><div style="text-align:right"><span class="pill">${money(c.anticipo)}</span><br><button class="btn btn-ghost btn-small" style="margin-top:8px" onclick="deleteItem('citas','${c.id}')">Eliminar</button></div></div>`).join('')}</div>`}
function ventasList(limit){if(!state.ventas.length)return emptyState('Sin ventas registradas','Aquí aparecerán anticipos, sesiones pagadas y pendientes de cobro.','Registrar venta','nueva-venta');return `<div class="list">${state.ventas.slice().sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||'')).slice(0,limit||999).map(v=>`<div class="appt"><div><b>${safe(v.concepto)}</b><div class="muted tiny">${safe(v.tipo)} · ${safe(formatDate(v.fecha))}</div></div><div style="text-align:right"><span class="pill">${money(v.monto)}</span><br><button class="btn btn-ghost btn-small" style="margin-top:8px" onclick="deleteItem('ventas','${v.id}')">Eliminar</button></div></div>`).join('')}</div>`}
function table(headers,rows,kind){if(!rows.length){return emptyState('Sin registros','La información aparecerá aquí cuando empieces a capturar datos.','','')}return `<div class="table-wrap"><table class="table"><thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}<th></th></tr></thead><tbody>${rows.map(r=>`<tr>${r.cells.map(c=>`<td>${c}</td>`).join('')}<td><button class="btn btn-ghost btn-small" onclick="deleteItem('${kind}','${r.id}')">Eliminar</button></td></tr>`).join('')}</tbody></table></div>`}
function clientesRows(){return state.clientes.map(c=>({id:c.id,cells:[safe(c.nombre),safe(c.whatsapp),safe(c.instagram),safe(c.notas)]}))}
function artistasRows(){return state.artistas.map(a=>({id:a.id,cells:[safe(a.nombre),safe(a.especialidad),safe(a.contacto),safe(a.notas)]}))}
function mensajesRows(){return state.mensajes.map(m=>({id:m.id,cells:[safe(m.nombre),safe(m.objetivo),safe(m.texto)]}))}
function formatDate(value){if(!value)return ''; const d=new Date(value); if(Number.isNaN(d.getTime()))return value; return d.toLocaleString('es-MX',{dateStyle:'medium',timeStyle:value.includes('T')?'short':undefined});}
function styleSvg(kind){const common='fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"';const fill='fill="rgba(214,40,40,.34)" stroke="white" stroke-width="4"';const map={tiger:`<svg viewBox="0 0 240 170"><path ${fill} d="M62 100c5-43 31-68 66-68s60 25 66 68c4 29-21 50-66 50s-70-21-66-50Z"/><path ${common} d="M77 52 51 29M178 52l25-23M91 70l-24-14M149 70l24-14M96 101h1M143 101h1M103 121c12 10 24 10 36 0M120 106l-10 12h20l-10-12ZM82 133l-23 14M158 133l23 14"/><path ${common} d="M112 47l-8 25M128 47l8 25M120 40v28"/></svg>`,blackwork:`<svg viewBox="0 0 240 170"><path ${common} d="M120 22 168 82 120 148 72 82 120 22Z"/><path ${common} d="M120 22v126M72 82h96M92 57l56 50M148 57l-56 50"/><circle cx="120" cy="82" r="20" fill="rgba(214,40,40,.36)" stroke="white" stroke-width="4"/></svg>`,fineline:`<svg viewBox="0 0 240 170"><path ${common} stroke-width="3" d="M120 145c0-42 0-72 0-112M120 72c-34-29-58-27-72-4 27 2 47 12 72 4ZM121 100c34-29 58-27 72-4-27 2-47 12-72 4Z"/><path ${common} stroke-width="3" d="M99 42c10 7 17 17 21 30M141 70c-10 7-17 17-20 30"/></svg>`,lettering:`<svg viewBox="0 0 240 170"><path ${common} stroke-width="4" d="M35 104c20-42 48-42 43 0-4 31-37 24-29 2 7-19 35-14 54-5 27 13 54 9 76-20"/><path ${common} stroke-width="3" d="M70 126h100"/><text x="72" y="82" fill="white" font-size="34" font-family="Georgia" font-style="italic">Ink</text></svg>`,minimal:`<svg viewBox="0 0 240 170"><circle cx="120" cy="84" r="42" ${common} stroke-width="4"/><path ${common} stroke-width="4" d="M120 42v84M78 84h84M90 54l60 60M150 54l-60 60"/></svg>`,realismo:`<svg viewBox="0 0 240 170"><path ${fill} d="M85 78c0-30 20-52 35-52s35 22 35 52c0 26-15 54-35 54S85 104 85 78Z"/><path ${common} d="M95 78c12-9 23-9 34 0M133 78c10-8 20-8 30 0M120 82l-9 26h18M104 122c14 8 27 8 41 0"/><path ${common} stroke-width="3" d="M82 136c20 14 56 14 76 0"/></svg>`};return map[kind]||map.minimal;}
function render(){document.getElementById('view-dashboard').innerHTML=dashboard();document.getElementById('view-agenda').innerHTML=`<div class="card"><h2 class="display section-title">Agenda de ${safe(studio)}</h2>${apptList()}<br><button class="btn btn-primary" onclick="openModal('nueva-cita')">Agregar cita</button></div>`;document.getElementById('view-clientes').innerHTML=`<div class="card"><h2 class="display section-title">Clientes</h2>${table(['Cliente','WhatsApp','Instagram','Notas'],clientesRows(),'clientes')}<br><button class="btn btn-primary" onclick="openModal('nuevo-cliente')">Nuevo cliente</button></div>`;document.getElementById('view-disenos').innerHTML=`<div class="grid-3">${estilos.map(d=>`<div class="card"><div class="style-preview">${styleSvg(d.icon)}</div><h3 class="display">${d.name}</h3><p class="muted tiny">${d.desc}</p></div>`).join('')}</div>`;document.getElementById('view-ventas').innerHTML=`<div class="card"><h2 class="display section-title">Ventas y anticipos</h2>${ventasList()}<br><button class="btn btn-primary" onclick="openModal('nueva-venta')">Registrar venta</button></div>`;document.getElementById('view-artistas').innerHTML=`<div class="card"><h2 class="display section-title">Artistas</h2>${table(['Artista','Especialidad','Contacto','Notas'],artistasRows(),'artistas')}<br><button class="btn btn-primary" onclick="openModal('nuevo-artista')">Agregar artista</button></div>`;document.getElementById('view-marketing').innerHTML=`<div class="grid-2"><div class="card"><h2 class="display section-title">Marketing</h2><p class="muted">Guarda plantillas de confirmación, anticipos y recuperación de clientes.</p><button class="btn btn-primary" onclick="openModal('mensaje')">Crear plantilla</button></div><div class="card"><h3 class="display">Plantillas</h3>${table(['Nombre','Objetivo','Mensaje'],mensajesRows(),'mensajes')}</div></div>`;document.getElementById('view-config').innerHTML=`<div class="card"><h2 class="display section-title">Configuración</h2><div class="ok">Producto activo. Esta versión guarda información en el navegador del usuario.</div><br><div class="notice">Liga sugerida:<br><b>${location.origin}${location.pathname}?studio=${encodeURIComponent(studio)}&lic=${encodeURIComponent(lic)}</b></div><br>${table(['Campo','Valor'],[{id:'config',cells:['Estudio',safe(studio)]},{id:'config2',cells:['Licencia',safe(lic)]},{id:'config3',cells:['Almacenamiento','Local del navegador']}],'noop')}<div class="toolbar"><button class="btn btn-ghost" onclick="exportBackup()">Exportar respaldo JSON</button><label class="btn btn-ghost" style="cursor:pointer">Importar respaldo<input type="file" accept="application/json" style="display:none" onchange="importBackup(event)"></label><button class="btn btn-ghost" onclick="resetData()">Borrar datos</button></div></div>`;}
function modalForm(fields,button,handler){return `<form onsubmit="${handler}(event)"><div class="form-row">${fields.map(f=>f.type==='textarea'?`<textarea class="form-input" rows="5" name="${f.name}" placeholder="${f.label}" ${f.required?'required':''}></textarea>`:`<input class="form-input" name="${f.name}" type="${f.type||'text'}" placeholder="${f.label}" ${f.required?'required':''}>`).join('')}</div><br><button class="btn btn-primary" type="submit">${button}</button></form>`}
function openModal(type){const t=document.getElementById('modalTitle'),b=document.getElementById('modalBody');if(type==='nueva-cita'){t.textContent='Nueva cita';b.innerHTML=modalForm([{name:'cliente',label:'Cliente',required:true},{name:'fecha',label:'Fecha y hora',type:'datetime-local',required:true},{name:'servicio',label:'Servicio / estilo',required:true},{name:'artista',label:'Artista asignado'},{name:'anticipo',label:'Anticipo',type:'number'}],'Guardar cita','saveCita')}else if(type==='nuevo-cliente'){t.textContent='Nuevo cliente';b.innerHTML=modalForm([{name:'nombre',label:'Nombre',required:true},{name:'whatsapp',label:'WhatsApp'},{name:'instagram',label:'Instagram'},{name:'notas',label:'Notas'}],'Guardar cliente','saveCliente')}else if(type==='nuevo-artista'){t.textContent='Nuevo artista';b.innerHTML=modalForm([{name:'nombre',label:'Nombre artístico',required:true},{name:'especialidad',label:'Especialidad'},{name:'contacto',label:'Instagram / contacto'},{name:'notas',label:'Notas'}],'Guardar artista','saveArtista')}else if(type==='nueva-venta'){t.textContent='Registrar venta';b.innerHTML=modalForm([{name:'concepto',label:'Concepto',required:true},{name:'tipo',label:'Tipo: Anticipo / Sesión / Producto',required:true},{name:'monto',label:'Monto',type:'number',required:true},{name:'fecha',label:'Fecha',type:'date'}],'Guardar venta','saveVenta')}else{t.textContent='Plantilla de marketing';b.innerHTML=modalForm([{name:'nombre',label:'Nombre de la plantilla',required:true},{name:'objetivo',label:'Objetivo'},{name:'texto',label:'Escribe aquí tu mensaje',type:'textarea',required:true}],'Guardar plantilla','saveMensaje')}document.getElementById('modal').classList.add('active')}
function closeModal(){document.getElementById('modal').classList.remove('active')}
function fd(form){return Object.fromEntries(new FormData(form).entries())}
function saveCita(e){e.preventDefault();const x=fd(e.target);state.citas.push({id:uid(),...x,anticipo:Number(x.anticipo||0)});if(Number(x.anticipo||0)>0){state.ventas.push({id:uid(),concepto:`Anticipo · ${x.cliente}`,tipo:'Anticipo',monto:Number(x.anticipo),fecha:(x.fecha||todayISO()).slice(0,10)});}saveState();closeModal();}
function saveCliente(e){e.preventDefault();state.clientes.push({id:uid(),...fd(e.target)});saveState();closeModal();}
function saveArtista(e){e.preventDefault();state.artistas.push({id:uid(),...fd(e.target)});saveState();closeModal();}
function saveVenta(e){e.preventDefault();const x=fd(e.target);state.ventas.push({id:uid(),...x,monto:Number(x.monto||0),fecha:x.fecha||todayISO()});saveState();closeModal();}
function saveMensaje(e){e.preventDefault();state.mensajes.push({id:uid(),...fd(e.target)});saveState();closeModal();}
function deleteItem(kind,id){if(kind==='noop')return; if(!confirm('¿Eliminar este registro?'))return; state[kind]=state[kind].filter(x=>x.id!==id);saveState();}
function exportBackup(){const blob=new Blob([JSON.stringify({studio,lic,state},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`InkStudio_${studio.replace(/\s+/g,'_')}_respaldo.json`;a.click();URL.revokeObjectURL(a.href)}
function importBackup(ev){const file=ev.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const data=JSON.parse(reader.result);state={...initialState,...(data.state||data)};saveState();alert('Respaldo importado correctamente.')}catch(e){alert('No se pudo importar el archivo.')}};reader.readAsText(file)}
function resetData(){if(!confirm('Esto borrará los datos guardados en este navegador. ¿Continuar?'))return;state={...initialState};saveState();}
document.querySelectorAll('.nav button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.getElementById('view-'+btn.dataset.view).classList.add('active')}));
setIdentity();render();
</script>
</body>
</html>
